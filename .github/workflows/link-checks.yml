name: Link Checks

on:
  push:
  pull_request:

jobs:
  link-checks:
    name: Validate maps and contact links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Garland maps URL check
        run: node tests/garland-maps-url.test.mjs

      - name: Dallas maps URL check
        run: node tests/dallas-maps-url.test.mjs

      - name: Contact details check
        run: node tests/contact-details.test.mjs
