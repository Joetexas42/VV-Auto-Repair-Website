kind = "web"
previewPath = "/"
title = "VV Auto Repair Website"
version = "1.0.0"
id = "artifacts/vv-auto-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21511

[services.development]
run = "pnpm --filter @workspace/vv-auto-website run dev"

[services.production]
publicDir = "artifacts/vv-auto-website"
serve = "static"

[[services.production.rewrites]]
from = "/about"
to = "/about.html"

[[services.production.rewrites]]
from = "/contact"
to = "/contact.html"

[[services.production.rewrites]]
from = "/built-by"
to = "/built-by.html"

[[services.production.rewrites]]
from = "/services"
to = "/services/index.html"

[[services.production.rewrites]]
from = "/services/brake-repair"
to = "/services/brake-repair.html"

[[services.production.rewrites]]
from = "/services/collision-body-repair"
to = "/services/collision-body-repair.html"

[[services.production.rewrites]]
from = "/services/diagnostics"
to = "/services/diagnostics.html"

[[services.production.rewrites]]
from = "/services/engine-repair"
to = "/services/engine-repair.html"

[[services.production.rewrites]]
from = "/services/oil-change"
to = "/services/oil-change.html"

[[services.production.rewrites]]
from = "/services/state-inspection"
to = "/services/state-inspection.html"

[services.env]
PORT = "21511"
BASE_PATH = "/"
